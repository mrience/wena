on:
  pull_request:
    paths-ignore: "./wena-tests"

env:
  TF_CLOUD_ORGANIZATION: ${{vars.TF_CLOUD_ORGANIZATION}}
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"
  CONFIG_DIRECTORY: "./wena-terraform"
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}

jobs:

  terraform-plan:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v 6.0.2
    
    - name: Terraform Plan
      uses: ./.github/actions/terraform-plan/action.yaml
      with:
        tf-workspace: ${{ vars.TF_CLOUD_WORKSPACE }}

