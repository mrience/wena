on:
  push:
    branches: [main]

permissions:
  # so GitHub can check out this repo using the default github.token
  contents: read

env:
  TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"
  CONFIG_DIRECTORY: "./"

jobs:
  deploy:
    name: Wena infrastructure deployment to ${{ matrix.environment }} environment
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]

    environment: ${{ matrix.environment }}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v 6.0.2
    
    - name: Terraform Plan
      uses: ./.github/actions/terraform-plan
      with:
        tf-workspace: ${{ vars.TF_WORKSPACE }}

    - name: Terraform Apply
      uses: ./.github/actions/terraform-apply
      with:
        tf-workspace: ${{ vars.TF_WORKSPACE }}

  